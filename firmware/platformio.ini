[env:lilygo_t_display_s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.1.0

build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=170
  -D TFT_HEIGHT=320
  -D CGRAM_OFFSET=1
  -D TFT_MOSI=13
  -D TFT_SCLK=18
  -D TFT_CS=12
  -D TFT_DC=11
  -D TFT_RST=5
  -D TFT_BL=38
  -D TFT_BACKLIGHT_ON=1
  -D SPI_FREQUENCY=40000000
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
