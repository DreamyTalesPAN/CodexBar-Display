name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  customer-package-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require customer package signing and notarization secrets
        env:
          CERTIFICATE_BASE64: ${{ secrets.VIBETV_PKG_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.VIBETV_PKG_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.VIBETV_NOTARY_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.VIBETV_NOTARY_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.VIBETV_NOTARY_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${CERTIFICATE_BASE64}" ]] || missing+=(VIBETV_PKG_CERTIFICATE_BASE64)
          [[ -n "${CERTIFICATE_PASSWORD}" ]] || missing+=(VIBETV_PKG_CERTIFICATE_PASSWORD)
          [[ -n "${APPLE_ID}" ]] || missing+=(VIBETV_NOTARY_APPLE_ID)
          [[ -n "${APPLE_TEAM_ID}" ]] || missing+=(VIBETV_NOTARY_TEAM_ID)
          [[ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ]] || missing+=(VIBETV_NOTARY_APP_SPECIFIC_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            echo "error: customer release package secrets are missing:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            echo "Configure Developer ID Installer signing and Apple notarization secrets before tagging a customer release." >&2
            exit 1
          fi

          echo "Customer package signing and notarization secrets are configured."

  build-and-release:
    needs: customer-package-preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio intelhex

      - name: Build Release Artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          mkdir -p dist/companion dist/firmware

          if [[ ! -f scripts/install.sh ]]; then
            echo "error: scripts/install.sh is missing" >&2
            exit 1
          fi
          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh
          cp scripts/install-control-center-companion-release.sh dist/install-control-center-companion.sh
          chmod +x dist/install-control-center-companion.sh

          cd companion
          for ARCH in amd64 arm64; do
            OUT="../dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}"
            GOOS=darwin GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${VERSION} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "${OUT}" ./cmd/codexbar-display
          done
          cd ..

          declare -a TARGETS=(
            "firmware_esp8266 esp8266_smalltv_st7789 esp8266-smalltv-st7789"
            "firmware_esp32 lilygo_t_display_s3 esp32-lilygo-t-display-s3"
          )

          for SPEC in "${TARGETS[@]}"; do
            set -- ${SPEC}
            DIR="$1"
            ENV_NAME="$2"
            MAX_FLASH_PCT="46"
            MAX_RAM_PCT="82"
            MAX_BIN_BYTES="0"
            MAX_GZIP_BYTES="0"
            if [[ "${ENV_NAME}" == "esp8266_smalltv_st7789" ]]; then
              MAX_BIN_BYTES="482000"
              MAX_GZIP_BYTES="350000"
            fi

            CODEXBAR_DISPLAY_FW_VERSION="${VERSION}" ./scripts/check-firmware-size-budget.sh \
              "${DIR}" \
              "${ENV_NAME}" \
              "${MAX_FLASH_PCT}" \
              "${MAX_RAM_PCT}" \
              "${MAX_BIN_BYTES}" \
              "${MAX_GZIP_BYTES}"

            SRC="${DIR}/.pio/build/${ENV_NAME}/firmware.bin"
            DEST="dist/firmware/codexbar-display-firmware-${ENV_NAME}-v${VERSION}.bin"
            cp "${SRC}" "${DEST}"
            if [[ "${ENV_NAME}" == esp8266_* ]]; then
              gzip -c -9 "${SRC}" > "${DEST}.gz"
            fi
          done

          VERSION="${VERSION}" python3 - <<'PY'
          import hashlib
          import json
          import os

          version = os.environ["VERSION"]
          repo = os.environ.get("GITHUB_REPOSITORY", "DreamyTalesPAN/CodexBar-Display")
          targets = [
              ("esp8266_smalltv_st7789", "esp8266-smalltv-st7789"),
              ("lilygo_t_display_s3", "esp32-lilygo-t-display-s3"),
          ]

          manifest = {
              "schemaVersion": 1,
              "release": f"v{version}",
              "protocolVersion": 1,
              "artifacts": [],
          }

          for env_name, board in targets:
              path = f"dist/firmware/codexbar-display-firmware-{env_name}-v{version}.bin"
              if env_name.startswith("esp8266_"):
                  path = path + ".gz"
              asset = os.path.basename(path)
              with open(path, "rb") as f:
                  sha = hashlib.sha256(f.read()).hexdigest()

              manifest["artifacts"].append(
                  {
                      "firmwareEnv": env_name,
                      "board": board,
                      "firmwareVersion": version,
                      "asset": asset,
                      "sha256": sha,
                      "severity": "recommended",
                      "message": "Firmware update available. Open vibetv.local.",
                      "firmwareUrl": f"https://github.com/{repo}/releases/download/v{version}/{asset}",
                  }
              )

          for out_path in (
              f"dist/firmware/firmware-manifest-v{version}.json",
              "dist/firmware/firmware-manifest.json",
          ):
              with open(out_path, "w", encoding="utf-8") as f:
                  json.dump(manifest, f, indent=2)
                  f.write("\n")
          PY

          (
            cd dist
            find . -type f ! -name "checksums-*" -print0 | sort -z | xargs -0 sha256sum > "checksums-v${VERSION}.txt"
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/install.sh
            dist/install-control-center-companion.sh
            dist/companion/*
            dist/firmware/*.bin
            dist/firmware/*.bin.gz
            dist/firmware/firmware-manifest.json
            dist/firmware/firmware-manifest-*.json
            dist/checksums-*.txt

  build-companion-pkgs:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Prepare Apple package signing
        id: signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.VIBETV_PKG_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.VIBETV_PKG_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.VIBETV_PKG_SIGN_IDENTITY }}
        run: |
          set -euo pipefail

          if [[ -z "${CERTIFICATE_BASE64}" || -z "${CERTIFICATE_PASSWORD}" ]]; then
            echo "error: Apple package signing secrets are not configured." >&2
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/vibetv-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="${RUNNER_TEMP}/vibetv-installer-certificate.p12"

          printf '%s' "${CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          if [[ -z "${SIGN_IDENTITY}" ]]; then
            SIGN_IDENTITY="$(security find-identity -v -p basic "${KEYCHAIN_PATH}" | awk -F '"' '/Developer ID Installer/ {print $2; exit}')"
          fi
          if [[ -z "${SIGN_IDENTITY}" ]]; then
            echo "error: could not find a Developer ID Installer signing identity" >&2
            exit 1
          fi

          echo "VIBETV_SIGNING_KEYCHAIN=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "VIBETV_PKG_SIGN_IDENTITY=${SIGN_IDENTITY}" >> "${GITHUB_ENV}"
          echo "VIBETV_NOTARY_KEYCHAIN=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "Companion PKGs will be signed with Developer ID Installer."

      - name: Prepare Apple notarization
        id: notarization
        env:
          APPLE_ID: ${{ secrets.VIBETV_NOTARY_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.VIBETV_NOTARY_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.VIBETV_NOTARY_APP_SPECIFIC_PASSWORD }}
          NOTARY_PROFILE: ${{ secrets.VIBETV_NOTARY_PROFILE }}
        run: |
          set -euo pipefail

          if [[ -z "${VIBETV_PKG_SIGN_IDENTITY:-}" ]]; then
            echo "error: package signing is not configured." >&2
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
          if [[ -z "${APPLE_ID}" || -z "${APPLE_TEAM_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" ]]; then
            echo "error: Apple notarization secrets are not configured." >&2
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

          PROFILE="${NOTARY_PROFILE:-vibetv-notary}"
          xcrun notarytool store-credentials "${PROFILE}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --keychain "${VIBETV_SIGNING_KEYCHAIN}"

          echo "VIBETV_NOTARY_PROFILE=${PROFILE}" >> "${GITHUB_ENV}"
          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "Companion PKGs will be submitted for notarization."

      - name: Build Companion PKGs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          mkdir -p dist/companion dist/companion-pkg

          cd companion
          for ARCH in amd64 arm64; do
            OUT="../dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}"
            GOOS=darwin GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${VERSION} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "${OUT}" ./cmd/codexbar-display
          done
          cd ..

          for ARCH in amd64 arm64; do
            scripts/build-control-center-companion-pkg.sh \
              --version "${VERSION}" \
              --arch "${ARCH}" \
              --binary "dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}" \
              --out "dist/companion-pkg"
          done

      - name: Validate Companion PKG payloads
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          for PKG in dist/companion-pkg/*.pkg; do
            scripts/check-control-center-companion-customer-readiness.sh \
              --pkg "${PKG}" \
              --expect-version "${VERSION}"
          done

      - name: Validate signed customer Companion PKGs
        if: ${{ steps.signing.outputs.ready == 'true' && steps.notarization.outputs.ready == 'true' }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          for PKG in dist/companion-pkg/*.pkg; do
            scripts/check-control-center-companion-customer-readiness.sh \
              --pkg "${PKG}" \
              --expect-version "${VERSION}" \
              --require-signed \
              --require-notarized
          done

      - name: Reject unsigned Companion PKG release upload
        if: ${{ steps.signing.outputs.ready != 'true' || steps.notarization.outputs.ready != 'true' }}
        run: |
          echo "error: signed and notarized Companion PKGs are required for customer releases." >&2
          exit 1

      - name: Upload Companion PKGs to GitHub Release
        if: ${{ steps.signing.outputs.ready == 'true' && steps.notarization.outputs.ready == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            dist/companion-pkg/*.pkg
