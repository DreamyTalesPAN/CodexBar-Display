name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio intelhex

      - name: Build Release Artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          mkdir -p dist/companion dist/firmware

          if [[ ! -f scripts/install.sh ]]; then
            echo "error: scripts/install.sh is missing" >&2
            exit 1
          fi
          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh
          cp scripts/install-control-center-companion-release.sh dist/install-control-center-companion.sh
          chmod +x dist/install-control-center-companion.sh

          cd companion
          for ARCH in amd64 arm64; do
            OUT="../dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}"
            GOOS=darwin GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${VERSION} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "${OUT}" ./cmd/codexbar-display
          done
          cd ..

          declare -a TARGETS=(
            "firmware_esp8266 esp8266_smalltv_st7789 esp8266-smalltv-st7789"
            "firmware_esp32 lilygo_t_display_s3 esp32-lilygo-t-display-s3"
          )

          for SPEC in "${TARGETS[@]}"; do
            set -- ${SPEC}
            DIR="$1"
            ENV_NAME="$2"
            MAX_FLASH_PCT="46"
            MAX_RAM_PCT="82"
            MAX_BIN_BYTES="0"
            MAX_GZIP_BYTES="0"
            if [[ "${ENV_NAME}" == "esp8266_smalltv_st7789" ]]; then
              MAX_BIN_BYTES="482000"
              MAX_GZIP_BYTES="350000"
            fi

            CODEXBAR_DISPLAY_FW_VERSION="${VERSION}" ./scripts/check-firmware-size-budget.sh \
              "${DIR}" \
              "${ENV_NAME}" \
              "${MAX_FLASH_PCT}" \
              "${MAX_RAM_PCT}" \
              "${MAX_BIN_BYTES}" \
              "${MAX_GZIP_BYTES}"

            SRC="${DIR}/.pio/build/${ENV_NAME}/firmware.bin"
            DEST="dist/firmware/codexbar-display-firmware-${ENV_NAME}-v${VERSION}.bin"
            cp "${SRC}" "${DEST}"
            if [[ "${ENV_NAME}" == esp8266_* ]]; then
              gzip -c -9 "${SRC}" > "${DEST}.gz"
            fi
          done

          VERSION="${VERSION}" python3 - <<'PY'
          import hashlib
          import json
          import os

          version = os.environ["VERSION"]
          repo = os.environ.get("GITHUB_REPOSITORY", "DreamyTalesPAN/CodexBar-Display")
          targets = [
              ("esp8266_smalltv_st7789", "esp8266-smalltv-st7789"),
              ("lilygo_t_display_s3", "esp32-lilygo-t-display-s3"),
          ]

          manifest = {
              "schemaVersion": 1,
              "release": f"v{version}",
              "protocolVersion": 1,
              "artifacts": [],
          }

          for env_name, board in targets:
              path = f"dist/firmware/codexbar-display-firmware-{env_name}-v{version}.bin"
              if env_name.startswith("esp8266_"):
                  path = path + ".gz"
              asset = os.path.basename(path)
              with open(path, "rb") as f:
                  sha = hashlib.sha256(f.read()).hexdigest()

              manifest["artifacts"].append(
                  {
                      "firmwareEnv": env_name,
                      "board": board,
                      "firmwareVersion": version,
                      "asset": asset,
                      "sha256": sha,
                      "severity": "recommended",
                      "message": "Firmware update available. Open vibetv.local.",
                      "firmwareUrl": f"https://github.com/{repo}/releases/download/v{version}/{asset}",
                  }
              )

          for out_path in (
              f"dist/firmware/firmware-manifest-v{version}.json",
              "dist/firmware/firmware-manifest.json",
          ):
              with open(out_path, "w", encoding="utf-8") as f:
                  json.dump(manifest, f, indent=2)
                  f.write("\n")
          PY

          (
            cd dist
            find . -type f ! -name "checksums-*" -print0 | sort -z | xargs -0 sha256sum > "checksums-v${VERSION}.txt"
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/install.sh
            dist/install-control-center-companion.sh
            dist/companion/*
            dist/firmware/*.bin
            dist/firmware/*.bin.gz
            dist/firmware/firmware-manifest.json
            dist/firmware/firmware-manifest-*.json
            dist/checksums-*.txt

  build-companion-pkgs:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Build Companion PKGs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${VERSION#v}"
          mkdir -p dist/companion dist/companion-pkg

          cd companion
          for ARCH in amd64 arm64; do
            OUT="../dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}"
            GOOS=darwin GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${VERSION} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "${OUT}" ./cmd/codexbar-display
          done
          cd ..

          for ARCH in amd64 arm64; do
            scripts/build-control-center-companion-pkg.sh \
              --version "${VERSION}" \
              --arch "${ARCH}" \
              --binary "dist/companion/codexbar-display-darwin-${ARCH}-v${VERSION}" \
              --out "dist/companion-pkg"
          done

      - name: Upload Companion PKGs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            dist/companion-pkg/*.pkg
