name: CODEX Build macOS Preview DMG

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit SHA or branch
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: codex-macos-preview-dmg
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.repository == 'DreamyTalesPAN/CodexBar-Display' &&
      github.ref == 'refs/heads/main' &&
      github.actor == github.repository_owner
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout requested source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Build Mac app
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          version="99.0.${GITHUB_RUN_NUMBER}"
          mkdir -p dist/macos tmp/macos-preview

          (
            cd apps/control-center
            npm ci
            npm run build:local
          )
          rm -rf companion/internal/companionapi/controlcenter_static
          mkdir -p companion/internal/companionapi/controlcenter_static
          cp -R apps/control-center/out-local/. companion/internal/companionapi/controlcenter_static/

          cd companion
          for arch in amd64 arm64; do
            GOOS=darwin GOARCH="${arch}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${version} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${source_sha}" \
              -o "../tmp/macos-preview/codexbar-display-${arch}" ./cmd/codexbar-display
          done
          cd ..
          lipo -create \
            -output tmp/macos-preview/codexbar-display \
            tmp/macos-preview/codexbar-display-amd64 \
            tmp/macos-preview/codexbar-display-arm64

          ./scripts/build-macos-control-center-app.sh \
            --version "${version}" \
            --build "${GITHUB_RUN_NUMBER}" \
            --universal \
            --companion-binary tmp/macos-preview/codexbar-display \
            --output "dist/macos/VibeTV Control Center.app"

          tar -czf tmp/macos-preview/app.tar.gz \
            -C dist/macos "VibeTV Control Center.app"
          {
            echo "### macOS Preview DMG"
            echo "- Source: \`${source_sha}\`"
            echo "- Version: \`${version}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Pass app to signing job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CODEX-vibetv-preview-app-${{ github.run_id }}
          path: tmp/macos-preview/app.tar.gz
          retention-days: 1

  sign:
    needs: build
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      # The requested source never receives the Apple credentials. Only these
      # already-reviewed signing tools run in this job.
      - name: Checkout signing tools
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Reviewed main commit that signs Sparkle's nested code inside-out.
          ref: 24c3855468991f28ef1af2df905b95944d90985c
          persist-credentials: false

      - name: Download Mac app
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: CODEX-vibetv-preview-app-${{ github.run_id }}
          path: tmp/macos-preview

      - name: Extract Mac app
        run: |
          mkdir -p dist/macos
          tar -xzf tmp/macos-preview/app.tar.gz -C dist/macos

      - name: Sign and notarize DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          ./scripts/sign-notarize-macos-control-center.sh \
            --app "dist/macos/VibeTV Control Center.app" \
            --sign-app-only \
            --allow-internal-xprotect-preflight-error
          ./scripts/build-macos-control-center-dmg.sh \
            --app "dist/macos/VibeTV Control Center.app" \
            --output dist/macos/VibeTV-Control-Center.dmg \
            --staging-dir tmp/macos-preview/dmg-stage
          ./scripts/sign-notarize-macos-control-center.sh \
            --app "dist/macos/VibeTV Control Center.app" \
            --dmg dist/macos/VibeTV-Control-Center.dmg \
            --skip-app-sign
          ./scripts/verify-macos-control-center-dmg.sh \
            --dmg dist/macos/VibeTV-Control-Center.dmg

      - name: Upload signed DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CODEX-vibetv-preview-dmg-${{ github.run_id }}
          path: dist/macos/VibeTV-Control-Center.dmg
          retention-days: 1
          compression-level: 0
