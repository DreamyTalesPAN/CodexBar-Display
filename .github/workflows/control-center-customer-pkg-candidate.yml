name: Control Center Customer Package Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to build, for example 1.0.32 or v1.0.32"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-signed-mac-app-pkgs:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum

      - name: Validate requested version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          VERSION="${INPUT_VERSION#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: version must be x.y.z or vx.y.z, got ${INPUT_VERSION}" >&2
            exit 1
          fi
          echo "VIBETV_CANDIDATE_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Prepare Apple package signing
        id: signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.VIBETV_PKG_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.VIBETV_PKG_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.VIBETV_PKG_SIGN_IDENTITY }}
        run: |
          set -euo pipefail

          if [[ -z "${CERTIFICATE_BASE64}" || -z "${CERTIFICATE_PASSWORD}" ]]; then
            echo "error: Apple package signing secrets are not configured." >&2
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/vibetv-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="${RUNNER_TEMP}/vibetv-installer-certificate.p12"

          printf '%s' "${CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          if [[ -z "${SIGN_IDENTITY}" ]]; then
            SIGN_IDENTITY="$(security find-identity -v -p basic "${KEYCHAIN_PATH}" | awk -F '"' '/Developer ID Installer/ {print $2; exit}')"
          fi
          if [[ -z "${SIGN_IDENTITY}" ]]; then
            echo "error: could not find a Developer ID Installer signing identity" >&2
            exit 1
          fi

          echo "VIBETV_SIGNING_KEYCHAIN=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "VIBETV_PKG_SIGN_IDENTITY=${SIGN_IDENTITY}" >> "${GITHUB_ENV}"
          echo "VIBETV_NOTARY_KEYCHAIN=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Prepare Apple notarization
        id: notarization
        env:
          APPLE_ID: ${{ secrets.VIBETV_NOTARY_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.VIBETV_NOTARY_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.VIBETV_NOTARY_APP_SPECIFIC_PASSWORD }}
          NOTARY_PROFILE: ${{ secrets.VIBETV_NOTARY_PROFILE }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_ID}" || -z "${APPLE_TEAM_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" ]]; then
            echo "error: Apple notarization secrets are not configured." >&2
            exit 1
          fi

          PROFILE="${NOTARY_PROFILE:-vibetv-notary}"
          xcrun notarytool store-credentials "${PROFILE}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --keychain "${VIBETV_SIGNING_KEYCHAIN}"

          echo "VIBETV_NOTARY_PROFILE=${PROFILE}" >> "${GITHUB_ENV}"
          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Build Mac App binaries
        run: |
          set -euo pipefail

          mkdir -p dist/companion
          cd companion
          for ARCH in amd64 arm64; do
            OUT="../dist/companion/codexbar-display-darwin-${ARCH}-v${VIBETV_CANDIDATE_VERSION}"
            GOOS=darwin GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build \
              -ldflags "-s -w -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Version=${VIBETV_CANDIDATE_VERSION} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/DreamyTalesPAN/CodexBar-Display/companion/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "${OUT}" ./cmd/codexbar-display
          done

      - name: Build signed and notarized Mac App packages
        run: |
          set -euo pipefail

          mkdir -p dist/companion-pkg
          for ARCH in amd64 arm64; do
            scripts/build-control-center-companion-pkg.sh \
              --version "${VIBETV_CANDIDATE_VERSION}" \
              --arch "${ARCH}" \
              --binary "dist/companion/codexbar-display-darwin-${ARCH}-v${VIBETV_CANDIDATE_VERSION}" \
              --out "dist/companion-pkg"
          done

      - name: Validate signed and notarized Mac App packages
        run: |
          set -euo pipefail

          for PKG in dist/companion-pkg/*.pkg; do
            scripts/check-control-center-companion-customer-readiness.sh \
              --pkg "${PKG}" \
              --expect-version "${VIBETV_CANDIDATE_VERSION}" \
              --require-signed \
              --require-notarized
          done

      - name: Build package checksums
        run: |
          set -euo pipefail

          (
            cd dist/companion-pkg
            shasum -a 256 *.pkg > "checksums-v${VIBETV_CANDIDATE_VERSION}.txt"
          )

      - name: Upload signed Mac App package candidate
        uses: actions/upload-artifact@v4
        with:
          name: vibetv-mac-app-pkgs-v${{ env.VIBETV_CANDIDATE_VERSION }}
          path: |
            dist/companion-pkg/*.pkg
            dist/companion-pkg/checksums-*.txt
          if-no-files-found: error
          retention-days: 14
