name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  control-center-ui-review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Control Center UI review gate
        run: node scripts/check-control-center-ui-review-gate.mjs

      - name: Test Control Center UI review gate
        run: ./scripts/test-control-center-ui-review-gate.sh

  companion-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod

      - name: Run go vet
        working-directory: companion
        run: go vet ./...

      - name: Run Go tests
        working-directory: companion
        run: go test ./...

      - name: Install staticcheck
        working-directory: companion
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        working-directory: companion
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          staticcheck ./...

      - name: Check companion benchmark budgets
        run: ./scripts/check-companion-bench-budget.sh

      - name: Test agent git guardrails
        run: ./scripts/test-agent-git-guardrails.sh

      - name: Check ESP8266 soak gate
        run: ./scripts/check-esp8266-soak-gate.sh

      - name: Test customer-readiness checker
        run: ./scripts/test-control-center-companion-customer-readiness.sh

      - name: Test customer-ready gate
        run: ./scripts/test-control-center-customer-ready-gate.sh

      - name: Test Control Center release workflow
        run: ./scripts/test-control-center-release-workflow.sh

      - name: Test macOS DMG validation workflow
        run: ./scripts/test-macos-dmg-validation-workflow.sh

      - name: Test macOS DMG encrypted artifact helper
        run: ./scripts/test-macos-dmg-validation-artifact.sh

      - name: Test legacy install.sh Control Center migration
        run: ./scripts/test-install-sh-control-center-migration.sh

      - name: Test legacy Mac App support script guard
        run: ./scripts/test-control-center-companion-legacy-installer.sh

  theme-studio-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/theme-studio/package-lock.json

      - name: Install Theme Studio dependencies
        working-directory: tools/theme-studio
        run: npm ci

      - name: Build Theme Studio
        working-directory: tools/theme-studio
        run: npm run test:preview

  control-center-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Install Control Center dependencies
        working-directory: apps/control-center
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/control-center
        run: npx playwright install --with-deps chromium

      - name: Lint Control Center
        working-directory: apps/control-center
        run: npm run lint

      - name: Check Control Center customer UI copy
        working-directory: apps/control-center
        run: npm run check:customer-ui-copy

      - name: Test Control Center customer flows
        working-directory: apps/control-center
        run: npm run test:customer-flows

  theme-pack-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Theme Pack Dist
        run: ./scripts/check-theme-pack-dist.sh

  firmware-build-v0:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789
            max_flash_pct: 46
            max_ram_pct: 82
            max_bin_bytes: 482000
            max_gzip_bytes: 350000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Test ThemeSpec renderer core
        working-directory: firmware_esp8266
        run: pio test -e native_theme_spec_renderer

      - name: Build firmware + size budget
        run: |
          ./scripts/check-firmware-size-budget.sh \
            "${{ matrix.firmware_dir }}" \
            "${{ matrix.env_name }}" \
            "${{ matrix.max_flash_pct }}" \
            "${{ matrix.max_ram_pct }}" \
            "${{ matrix.max_bin_bytes }}" \
            "${{ matrix.max_gzip_bytes }}"

  firmware-build-experimental:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ESP32 experimental profile
        run: |
          ./scripts/check-firmware-size-budget.sh \
            "firmware_esp32" \
            "lilygo_t_display_s3" \
            "20" \
            "25" \
            "0"
