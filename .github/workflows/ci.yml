name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  companion-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: companion/go.mod

      - name: Run Go tests
        working-directory: companion
        run: go test ./...

      - name: Install staticcheck
        working-directory: companion
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        working-directory: companion
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          staticcheck ./...

      - name: Check companion benchmark budgets
        run: ./scripts/check-companion-bench-budget.sh

  firmware-build-v0:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - firmware_dir: firmware_esp8266
            env_name: esp8266_probe
            max_flash_pct: 45
            max_ram_pct: 60
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789
            max_flash_pct: 45
            max_ram_pct: 72
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789_crt
            max_flash_pct: 45
            max_ram_pct: 72
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789_mini
            max_flash_pct: 45
            max_ram_pct: 72
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789_alt
            max_flash_pct: 45
            max_ram_pct: 72
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789_alt_crt
            max_flash_pct: 45
            max_ram_pct: 72
          - firmware_dir: firmware_esp8266
            env_name: esp8266_smalltv_st7789_alt_mini
            max_flash_pct: 45
            max_ram_pct: 72
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware + size budget
        run: |
          ./scripts/check-firmware-size-budget.sh \
            "${{ matrix.firmware_dir }}" \
            "${{ matrix.env_name }}" \
            "${{ matrix.max_flash_pct }}" \
            "${{ matrix.max_ram_pct }}"

  firmware-build-experimental:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ESP32 experimental profile
        run: |
          ./scripts/check-firmware-size-budget.sh \
            "firmware" \
            "lilygo_t_display_s3" \
            "20" \
            "25"
