[platformio]
default_envs = esp8266_probe

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.1.0

[env:esp8266_probe]
platform = espressif8266
board = esp12e
upload_speed = 460800
build_flags =
  -D VIBEBLOCK_PROBE_ONLY=1

[env:esp8266_smalltv_st7789]
platform = espressif8266
board = esp12e
upload_speed = 460800
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_INVERSION_ON=1
  -D SPI_FREQUENCY=27000000
  -D TFT_MISO=-1
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=-1
  -D TFT_DC=0
  -D TFT_RST=2
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=0
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1

