[platformio]
default_envs = esp8266_probe

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.1.0

[env:esp8266_probe]
platform = espressif8266
board = esp12e
upload_speed = 460800
build_flags =
  -D VIBEBLOCK_PROBE_ONLY=1
  -D VIBEBLOCK_BOARD_ID=\"esp8266-probe\"
  -D VIBEBLOCK_FW_VERSION=\"1.0.0\"

[env:esp8266_probe_bench]
platform = espressif8266
board = esp12e
upload_speed = 460800
build_flags =
  -D VIBEBLOCK_PROBE_ONLY=1
  -D VIBEBLOCK_RUNTIME_BENCH=1
  -D VIBEBLOCK_BOARD_ID=\"esp8266-probe\"
  -D VIBEBLOCK_FW_VERSION=\"1.0.0\"

[env:esp8266_smalltv_st7789]
platform = espressif8266
board = esp12e
upload_speed = 460800
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m3m.ld
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
  bitbank2/AnimatedGIF@^2.2.0
build_flags =
  -D VIBEBLOCK_BOARD_ID=\"esp8266-smalltv-st7789\"
  -D VIBEBLOCK_FW_VERSION=\"1.0.0\"
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_INVERSION_ON=1
  -D SPI_FREQUENCY=27000000
  -D TFT_MISO=-1
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=-1
  -D TFT_DC=0
  -D TFT_RST=2
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=0
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1

[env:esp8266_smalltv_st7789_gif_player]
platform = espressif8266
board = esp12e
upload_speed = 460800
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m3m.ld
board_build.f_cpu = 160000000L
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
  bitbank2/AnimatedGIF@^2.2.0
build_flags =
  -D VIBEBLOCK_GIF_PLAYER=1
  -D VIBEBLOCK_BOARD_ID=\"esp8266-smalltv-st7789-gif-player\"
  -D VIBEBLOCK_FW_VERSION=\"1.0.0-gif-player\"
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_INVERSION_ON=1
  -D SPI_FREQUENCY=40000000
  -D TFT_MISO=-1
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=-1
  -D TFT_DC=0
  -D TFT_RST=2
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=0
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1

