[platformio]
default_envs = esp8266_probe

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.1.0

[env:esp8266_probe]
platform = espressif8266
board = esp12e
upload_speed = 460800
build_flags =
  -D VIBEBLOCK_PROBE_ONLY=1

[env:esp8266_ili9341_spi]
platform = espressif8266
board = esp12e
upload_speed = 460800
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_GFXFF=1
