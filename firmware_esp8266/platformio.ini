[platformio]
default_envs = esp8266_smalltv_st7789

[env]
monitor_speed = 115200
custom_fw_version = 1.0.37-dev
extra_scripts = pre:../scripts/pio_set_fw_version.py
lib_deps =
  bblanchon/ArduinoJson@7.4.2

[env:esp8266_smalltv_st7789]
platform = espressif8266
framework = arduino
board = esp12e
upload_speed = 460800
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
build_src_filter =
  +<*>
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@2.5.43
build_flags =
  -D CODEXBAR_DISPLAY_BOARD_ID=\"esp8266-smalltv-st7789\"
  -D CODEXBAR_DISPLAY_THEME_SPEC_RENDERER=1
  -D HTTP_UPLOAD_BUFLEN=512
  -D ARDUINOJSON_USE_DOUBLE=0
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_INVERSION_ON=1
  -D SPI_FREQUENCY=27000000
  -D TFT_MISO=-1
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=-1
  -D TFT_DC=0
  -D TFT_RST=2
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=0
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1

[env:esp8266_smalltv_st7789_bench]
platform = espressif8266
framework = arduino
board = esp12e
upload_speed = 460800
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
build_src_filter =
  +<*>
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@2.5.43
build_flags =
  -D CODEXBAR_DISPLAY_RUNTIME_BENCH=1
  -D CODEXBAR_DISPLAY_BOARD_ID=\"esp8266-smalltv-st7789\"
  -D CODEXBAR_DISPLAY_THEME_SPEC_RENDERER=1
  -D HTTP_UPLOAD_BUFLEN=512
  -D ARDUINOJSON_USE_DOUBLE=0
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_INVERSION_ON=1
  -D SPI_FREQUENCY=27000000
  -D TFT_MISO=-1
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=-1
  -D TFT_DC=0
  -D TFT_RST=2
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=0
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1

[env:esp8266_smalltv_st7789_wifi_recovery]
extends = env:esp8266_smalltv_st7789
build_flags =
  ${env:esp8266_smalltv_st7789.build_flags}
  -D CODEXBAR_DISPLAY_GIF_CORE=0

[env:esp8266_smalltv_st7789_wifi_bridge]
platform = espressif8266
framework = arduino
board = esp12e
upload_speed = 460800
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
build_src_filter =
  +<*>
lib_deps =
  ${env.lib_deps}
build_flags =
  -D CODEXBAR_DISPLAY_PROBE_ONLY=1
  -D CODEXBAR_DISPLAY_BOARD_ID=\"esp8266-smalltv-st7789\"
  -D CODEXBAR_DISPLAY_THEME_SPEC_RENDERER=0
  -D CODEXBAR_DISPLAY_GIF_CORE=0
  -D ARDUINOJSON_USE_DOUBLE=0

[env:native_theme_spec_renderer]
platform = native
test_framework = unity
test_filter = test_native_theme_spec
test_build_src = no
lib_deps =
  ${env.lib_deps}
build_flags =
  -std=gnu++17
  -I test/test_native_theme_spec
  -D ARDUINOJSON_USE_DOUBLE=0
  -D CODEXBAR_DISPLAY_THEME_SPEC_RENDERER=1

[env:native_wifi_setup]
platform = native
test_framework = unity
test_filter = test_native_wifi_setup
test_build_src = no
build_flags =
  -std=gnu++17
  -I test/test_native_wifi_setup
